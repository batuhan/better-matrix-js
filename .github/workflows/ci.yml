name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Typecheck, test, build, and package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: packages/core/native/go.mod
          cache-dependency-path: packages/core/native/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Go test
        run: pnpm test:go

      - name: Build
        run: pnpm build

      - name: Pack packages
        run: pnpm pack:packages

      - name: Consumer smoke
        run: pnpm smoke:consumer

      - name: Cloudflare Worker smoke
        run: pnpm smoke:cloudflare
